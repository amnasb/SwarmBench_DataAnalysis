task: Regional Sales Reconciliation

strategy: map_reduce

agents:

  - id: map_west
    role: Map Agent — West Region
    instructions: |
      Read the following files from /task/input_artifacts/:
        - sales_west_q1.csv
        - sales_west_q2.csv
        - sales_west_q3.csv
        - sales_west_q4.csv

      Use /task/input_artifacts/schema_reference.json to identify the correct
      column names (row_id, sub_category, sales) for each file.

      For each file:
      - Rename columns to: row_id, sub_category, sales
      - Parse sales: strip $, USD, commas, whitespace, convert to numeric
      - Remove rows where sales is null, non-numeric, or negative
      - Strip whitespace and normalize casing on sub_category (Title Case)
      - Track count of skipped rows

      Combine all 4 quarters into one list.

      Output to /task/work/west.json:
      {
        "region": "west",
        "records": [{"row_id": ..., "sub_category": ..., "sales": ...}],
        "skipped": <int>
      }

  - id: map_east
    role: Map Agent — East Region
    instructions: |
      Read the following files from /task/input_artifacts/:
        - sales_east_q1.csv
        - sales_east_q2.csv
        - sales_east_q3.csv
        - sales_east_q4.csv

      Use /task/input_artifacts/schema_reference.json to identify the correct
      column names (row_id, sub_category, sales) for each file.

      For each file:
      - Rename columns to: row_id, sub_category, sales
      - Parse sales: strip $, USD, commas, whitespace, convert to numeric
      - Remove rows where sales is null, non-numeric, or negative
      - Strip whitespace and normalize casing on sub_category (Title Case)
      - Track count of skipped rows

      Combine all 4 quarters into one list.

      Output to /task/work/east.json using the same structure.
      Set region = "east"

  - id: map_central
    role: Map Agent — Central Region
    instructions: |
      Read the following files from /task/input_artifacts/:
        - sales_central_q1.csv
        - sales_central_q2.csv
        - sales_central_q3.csv
        - sales_central_q4.csv

      Use /task/input_artifacts/schema_reference.json to identify the correct
      column names (row_id, sub_category, sales) for each file.

      For each file:
      - Rename columns to: row_id, sub_category, sales
      - Parse sales: strip $, USD, commas, whitespace, convert to numeric
      - Remove rows where sales is null, non-numeric, or negative
      - Strip whitespace and normalize casing on sub_category (Title Case)
      - Track count of skipped rows

      Combine all 4 quarters into one list.

      Output to /task/work/central.json using the same structure.
      Set region = "central"

  - id: map_south
    role: Map Agent — South Region
    instructions: |
      Read the following files from /task/input_artifacts/:
        - sales_south_q1.csv
        - sales_south_q2.csv
        - sales_south_q3.csv
        - sales_south_q4.csv

      Use /task/input_artifacts/schema_reference.json to identify the correct
      column names (row_id, sub_category, sales) for each file.

      For each file:
      - Rename columns to: row_id, sub_category, sales
      - Parse sales: strip $, USD, commas, whitespace, convert to numeric
      - Remove rows where sales is null, non-numeric, or negative
      - Strip whitespace and normalize casing on sub_category (Title Case)
      - Track count of skipped rows

      Combine all 4 quarters into one list.

      Output to /task/work/south.json using the same structure.
      Set region = "south"

  - id: reducer
    role: Reducer Agent
    depends_on:
      - map_west
      - map_east
      - map_central
      - map_south

    instructions: |
      Read:
      - /task/work/west.json
      - /task/work/east.json
      - /task/work/central.json
      - /task/work/south.json

      Merge all records into one combined list.

      Deduplicate records by row_id.
      Keep the first occurrence in this order: west -> east -> central -> south.
      Count all removed duplicate rows.

      Sum skipped counts from all 4 map agents.

      Compute:
      - total_sales: sum of all valid sales after dedup, rounded to 2 decimal places
      - region_totals: per-region sales sum after dedup, each rounded to 2 decimal places
      - top_3_sub_categories: top 3 sub-categories by total sales, descending order
      - duplicate_rows_removed: total duplicates removed
      - records_skipped_missing_sales: total skipped across all agents

      Write final output to /task/report.json
